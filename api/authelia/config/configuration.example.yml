# Example Authelia configuration.yml
server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

jwt_secret: example_jwt_secret
identity_validation:
  reset_password:
    jwt_secret: example_jwt_secret

storage:
  encryption_key: example_encryption_key
  local:
    path: /config/db.sqlite3

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: deny
  rules:
    - domain: "example.com"
      policy: one_factor

session:
  secret: example_session_secret
