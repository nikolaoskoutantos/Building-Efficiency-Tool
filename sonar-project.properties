# SonarQube Project Configuration
sonar.projectKey=nikolaoskoutantos_Building-Efficiency-Tool
sonar.organization=nikolaoskoutantos
sonar.projectName=Building-Efficiency-Tool

# Source directories - be specific, not "."
sonar.sources=api,ui,data_infrastructure,external_adapter,smart_contracts

# Exclusions - files and directories to exclude from analysis
sonar.exclusions=chainlink/**,\
                 **/node_modules/**,\
                 **/__pycache__/**,\
                 **/build/**,\
                 **/dist/**,\
                 **/.git/**,\
                 **/.vscode/**,\
                 **/*.log,\
                 **/*.md,\
                 **/*.pkl,\
                 **/*.joblib,\
                 **/*.db,\
                 **/*.sqlite,\
                 **/venv/**,\
                 **/env/**,\
                 **/site-packages/**,\
                 **/.conda/**,\
                 **/anaconda3/**,\
                 **/miniconda3/**,\
                 **/conda-env/**,\
                 **/Anaconda3/**,\
                 **/Python*/**,\
                 C:/Users/*/anaconda3/**,\
                 C:/Users/*/miniconda3/**,\
                 C:/Users/*/AppData/Local/Programs/Python/**,\
                 /usr/lib/python*/**,\
                 /usr/local/lib/python*/**,\
                 **/typing.py,\
                 **/collections.py,\
                 **/sys.py,\
                 **/os.py,\
                 **/mlflow_artifacts/**,\
                 **/saved_models/**,\
                 **/migrations/**,\
                 drafts/**,\
                 IKON/**,\
                 notebooks/**,\
                 img/**,\
                 logger/**,\
                 **/.env*,\
                 **/test_optim.py, \
                 /notebooks/**,\

# Additional Python-specific exclusions
sonar.python.xunit.reportPath=**/test-results.xml
sonar.python.coverage.reportPaths=coverage.xml

# Force SonarQube to only analyze the specified source directories
sonar.inclusions=**/*.py,**/*.js,**/*.ts,**/*.tsx,**/*.jsx,**/*.sol

# Test exclusions (if you want to exclude test files from main analysis)
sonar.test.exclusions=**/test/**,\
                      **/tests/**,\
                      **/*test*.py,\
                      **/*spec*.js

# Language-specific settings
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info
 
# Encoding
sonar.sourceEncoding=UTF-8