# SonarQube Project Configuration
sonar.projectKey=nikolaoskoutantos_Building-Efficiency-Tool
sonar.organization=nikolaoskoutantos
sonar.projectName=Building-Efficiency-Tool

# Restrict analysis to repository source directories only
sonar.sources=api,ui,data_infrastructure,external_adapter,smart_contracts

# Exclude generated, vendored, environment, and artifact content
sonar.exclusions=chainlink/**,\
**/node_modules/**,\
**/__pycache__/**,\
**/.git/**,\
**/.vscode/**,\
**/build/**,\
**/dist/**,\
**/coverage/**,\
**/venv/**,\
**/.venv/**,\
**/env/**,\
**/.conda/**,\
**/anaconda3/**,\
**/Anaconda3/**,\
**/miniconda3/**,\
**/conda-env/**,\
**/site-packages/**,\
**/Lib/site-packages/**,\
**/*.log,\
**/*.md,\
**/*.pkl,\
**/*.joblib,\
**/*.db,\
**/*.sqlite,\
**/mlflow_artifacts/**,\
**/saved_models/**,\
**/migrations/**,\
drafts/**,\
IKON/**,\
notebooks/**,\
img/**,\
logger/**,\
**/.env*

# Test exclusions
sonar.test.exclusions=**/test/**,\
**/tests/**,\
**/*test*.py,\
**/*spec*.js

# Reports
sonar.python.xunit.reportPath=**/test-results.xml
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
